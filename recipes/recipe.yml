# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bazzite-mechrevo
description: Bazzite with automated YT6801 driver updates.

base-image: ghcr.io/ublue-os/bazzite
image-version: latest

modules:
      - type: kargs
        kargs:
          - acpi.ec_no_wakeup=1

      - type: script
        scripts:
          - build-yt6801.sh
